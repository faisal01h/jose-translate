services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jose
      POSTGRES_PASSWORD: jose_secret
      POSTGRES_DB: jose_translate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jose -d jose_translate"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://jose:jose_secret@db:5432/jose_translate?schema=public
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
